{% extends "layout.html" %}

{% block content %}
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Submit</button>
  </form>
{% if stores %}
  <h2>Stores carrying this chai:</h2>
  <ul>
    {% for store in stores %}
      <li>{{ store.name }}</li>
    {% endfor %}
  </ul>
{% endif %}
{% endblock %}
