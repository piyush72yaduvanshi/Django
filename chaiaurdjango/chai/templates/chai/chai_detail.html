id="chai-detail-template"
{% extends 'layout.html' %}

{% block title %}
    {{ chai.name }}
{% endblock %}

{% block content %}

<div class="max-w-5xl mx-auto px-4 py-10">

    <div class="bg-white rounded-2xl shadow-lg overflow-hidden grid md:grid-cols-2 gap-6">

        <!-- Image -->
        <img 
            src="{{ chai.image.url }}" 
            alt="{{ chai.name }}"
            class="w-full h-full object-cover"
        >

        <!-- Content -->
        <div class="p-6 flex flex-col justify-between">

            <div>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">
                    {{ chai.name }}
                </h1>

                <span class="inline-block text-sm bg-green-100 text-green-700 px-3 py-1 rounded mb-3">
                    {{ chai.get_type_display }}
                </span>

                <p class="text-gray-600 mb-4">
                    {{ chai.description }}
                </p>

                <p class="text-2xl font-bold text-green-700 mb-3">
                    ₹{{ chai.price }}
                </p>

                <p class="text-sm text-gray-400">
                    Added on: {{ chai.date_added|date:"M d, Y" }}
                </p>
            </div>

            <!-- Buttons -->
            <div class="mt-6 flex gap-4">
                <button class="flex-1 bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">
                    Buy Now
                </button>

                <a href="/" class="flex-1 text-center border border-gray-300 py-2 rounded-lg hover:bg-gray-100 transition">
                    Back
                </a>
            </div>

        </div>

    </div>

</div>

{% endblock %}
